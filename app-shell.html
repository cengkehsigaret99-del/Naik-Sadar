<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Naik-Sadar</title>
  <link rel="stylesheet" href="assets/nusantara-theme.css?v=22">
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f6efe4;font-family:system-ui,sans-serif}
    #nsFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:transparent}
    .shellHint{position:fixed;right:14px;bottom:88px;z-index:9999;border-radius:999px;padding:9px 12px;background:rgba(255,250,242,.92);box-shadow:0 12px 30px rgba(92,53,25,.14);font-size:12px;font-weight:900;color:#24170f;pointer-events:none;opacity:.78}
    @media(max-width:420px){.shellHint{right:10px;bottom:84px;font-size:11px}}
  </style>
</head>
<body>
  <iframe id="nsFrame" title="Naik-Sadar" src="gerbang-17.html?v=22"></iframe>
  <div class="shellHint">Mode musik tetap aktif</div>
  <script>
    const frame=document.getElementById('nsFrame');
    function loadFromHash(){
      const target=decodeURIComponent((location.hash||'').replace(/^#/,''));
      if(target && target.endsWith('.html')) frame.src=target;
    }
    window.addEventListener('hashchange',loadFromHash);
    loadFromHash();
  </script>
  <script src="assets/nusantara-audio.js?v=22"></script>
</body>
</html>
